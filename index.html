<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gravity Switch Runner</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:lightblue;
}
canvas{
  display:block;
  margin:auto;
  background:white;
  border:2px solid black;
}
</style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let player={
  x:80,
  y:500,
  width:30,
  height:30,
  velocity:0,
  gravity:0.6,
  isOnFloor:true
};

let obstacles=[];
let frame=0;
let score=0;
let speed=3;
let gameOver=false;

function drawPlayer(){
  ctx.fillStyle="blue";
  ctx.fillRect(player.x,player.y,player.width,player.height);
}

function createObstacle(){
  let height=Math.random()*200+100;
  obstacles.push({
    x:canvas.width,
    width:40,
    height:height,
    passed:false
  });
}

function drawObstacles(){
  ctx.fillStyle="red";
  obstacles.forEach(ob=>{
    if(player.isOnFloor){
      ctx.fillRect(ob.x,canvas.height-ob.height,ob.width,ob.height);
    }else{
      ctx.fillRect(ob.x,0,ob.width,ob.height);
    }
  });
}

function updateObstacles(){
  if(frame%90===0){
    createObstacle();
  }

  obstacles.forEach(ob=>{
    ob.x-=speed;

    if(
      player.x<ob.x+ob.width &&
      player.x+player.width>ob.x
    ){
      if(
        (player.isOnFloor && player.y+player.height>canvas.height-ob.height) ||
        (!player.isOnFloor && player.y<ob.height)
      ){
        gameOver=true;
      }
    }

    if(ob.x+ob.width<player.x && !ob.passed){
      score++;
      ob.passed=true;
    }
  });

  obstacles=obstacles.filter(ob=>ob.x+ob.width>0);
}

function updatePlayer(){
  player.velocity+=player.gravity;
  player.y+=player.velocity;

  if(player.isOnFloor){
    if(player.y>500){
      player.y=500;
      player.velocity=0;
    }
  }else{
    if(player.y<70){
      player.y=70;
      player.velocity=0;
    }
  }
}

function drawScore(){
  ctx.fillStyle="black";
  ctx.font="24px Arial";
  ctx.fillText("Score: "+score,10,30);
}

function drawGameOver(){
  ctx.fillStyle="black";
  ctx.font="40px Arial";
  ctx.fillText("Game Over",90,300);
  ctx.font="20px Arial";
  ctx.fillText("Click to Restart",120,340);
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(!gameOver){
    updatePlayer();
    updateObstacles();
    speed+=0.0005;
  }

  drawPlayer();
  drawObstacles();
  drawScore();

  if(gameOver){
    drawGameOver();
  }else{
    frame++;
    requestAnimationFrame(gameLoop);
  }
}

function switchGravity(){
  player.isOnFloor=!player.isOnFloor;
  player.gravity*=-1;
}

function resetGame(){
  player.y=500;
  player.velocity=0;
  player.isOnFloor=true;
  player.gravity=0.6;
  obstacles=[];
  frame=0;
  score=0;
  speed=3;
  gameOver=false;
  gameLoop();
}

document.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    if(gameOver) resetGame();
    else switchGravity();
  }
});

document.addEventListener("click",()=>{
  if(gameOver) resetGame();
  else switchGravity();
});

gameLoop();
</script>

</body>
</html>
